version: '3.8'

services:
  mongodb:
    image: mongo
    container_name: mongodb
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/usersdb
    depends_on:
      - mongodb

  frontend-blue:
    build: ./frontend-blue
    ports:
      - "3100:3100"
    depends_on:
      - backend

  frontend-green:
    build: ./frontend-green
    ports:
      - "3200:3200"
    depends_on:
      - backend